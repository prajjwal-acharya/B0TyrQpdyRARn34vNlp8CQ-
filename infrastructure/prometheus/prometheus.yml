global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers: []

rule_files: []

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  - job_name: api
    static_configs:
      - targets: [api:8000]
    metrics_path: /metrics

  - job_name: worker
    static_configs:
      - targets: [worker:9100]

  - job_name: flower
    static_configs:
      - targets: [flower:5555]
    metrics_path: /metrics

  - job_name: redis
    static_configs:
      - targets: [redis:6379]

  - job_name: postgres
    static_configs:
      - targets: [db:5432]

[SERVICE]
    Flush        5
    Daemon       Off
    Log_Level    info
    Parsers_File parsers.conf

[INPUT]
    Name         forward
    Listen       0.0.0.0
    Port         24224

[INPUT]
    Name         tail
    Path         /var/log/containers/*.log
    Parser       docker
    Tag          docker.*
    Refresh_Interval 5

[FILTER]
    Name         record_modifier
    Match        *
    Record       platform adaptive-doc-intelligence

[OUTPUT]
    Name         loki
    Match        *
    Host         loki
    Port         3100
    Labels       job=fluent-bit
    Auto_Kubernetes_Labels Off
